<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white border-b px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-600">PremiumApp</h1>
        <div class="flex items-center gap-4">
            <span class="text-gray-600">Welcome, <strong>{{ name }}</strong></span>
            <a href="/logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-100 transition">Logout</a>
        </div>
    </nav>

    <main class="p-8 max-w-4xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-semibold mb-4">Your Private Workspace</h2>
            <p class="text-gray-500 mb-6">This content is protected by Flask sessions. Only logged-in users can see this.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-indigo-50 rounded-2xl">
                    <div class="text-indigo-600 font-bold text-lg">42</div>
                    <div class="text-indigo-400 text-xs uppercase tracking-wider">Active Tasks</div>
                </div>
                <div class="p-4 bg-purple-50 rounded-2xl">
                    <div class="text-purple-600 font-bold text-lg">12</div>
                    <div class="text-purple-400 text-xs uppercase tracking-wider">Messages</div>
                </div>
                <div class="p-4 bg-pink-50 rounded-2xl">
                    <div class="text-pink-600 font-bold text-lg">Pro</div>
                    <div class="text-pink-400 text-xs uppercase tracking-wider">Account Level</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
